# =====================================================================
#  Moonshine Streaming — Configuration
#
#  All tunable settings live here. Edit values below to experiment,
#  then re-run. No need to modify model.py.
#
#  Model variants (all English-only):
#    tiny_streaming    Smallest, true streaming KV-cache, bundled in package
#    base_streaming    Balanced quality, must download
#    small_streaming   Moderate size, must download
#    medium_streaming  Highest quality, must download
#    tiny              Non-streaming batch (bundled)
#    base              Non-streaming batch (must download)
#
#  Partial inference note:
#    True incremental KV-cache inference — each chunk processes only new
#    audio, not the full buffer. partial_interval_chunks controls how
#    often we poll update_transcription() for partial results.
# =====================================================================

# --- Model ---
model:
  v2_arch: "tiny_streaming"         # tiny_streaming, base_streaming,
                                    # small_streaming, medium_streaming,
                                    # tiny, base

# --- Audio Input ---
audio:
  sample_rate: 16000                # Hz — must match the competition's 16 kHz stream

# --- Streaming Behaviour ---
streaming:
  partial_interval_chunks: 20       # Poll for partials every N chunks (N×100 ms).
                                    # 20 = every 2 s. 0 = disabled.
  min_chunks_for_partial: 10        # Require at least this many chunks before the
                                    # first partial (avoids very short bursts).
